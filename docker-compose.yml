services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: liquor-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liquor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquor}
      POSTGRES_DB: ${POSTGRES_DB:-liquor}
    ports:
      - "${PG_HOST_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/pg-init.sql:/docker-entrypoint-initdb.d/10-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liquor}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: liquor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: liquor-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-liquor}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-liquorliquor}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
