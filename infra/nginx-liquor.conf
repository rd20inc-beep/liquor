# nginx vhost for liquor.scalamatic.com
# Install path: /etc/nginx/sites-enabled/liquor.scalamatic.com
# Symlink from: /etc/nginx/sites-available/liquor.scalamatic.com
#
# After certbot --nginx -d liquor.scalamatic.com runs, it will rewrite this
# file to add SSL config. Keep a copy at /home/liquor/liquor-os/infra/nginx-liquor.conf
# so we can always regenerate.

server {
    listen 80;
    listen [::]:80;
    server_name liquor.scalamatic.com;

    # Let's Encrypt will handle the redirect to https after certbot runs.
    # Before certbot: this block serves over HTTP.
    # After certbot:  certbot replaces this block with an http→https redirect.

    root /home/liquor/liquor-os/admin-web/dist;
    index index.html;

    # Proxy API calls through to the Liquor API on loopback
    location /v1 {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_read_timeout 30s;
    }

    # SPA fallback — React Router handles in-app routes.
    # index.html MUST NOT be cached, otherwise the browser keeps pointing at
    # old hashed bundles after a deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Static asset caching (Vite emits hashed filenames so long-cache is safe)
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Basic hardening
    add_header X-Content-Type-Options nosniff       always;
    add_header X-Frame-Options         SAMEORIGIN    always;
    add_header Referrer-Policy         same-origin   always;

    client_max_body_size 10M;
}
